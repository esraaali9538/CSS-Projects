<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="todo-list">
        <li>
          <input type="checkbox" id="memorizing-quran" />
          <label for="memorizing-quran">Memorizing Quran</label>
          <ul class="sub-item">
            <li>
              <a
                class="sub-item-link"
                target="_blank"
                href="https://www.youtube.com/watch?v=TG36vshU9lM"
              >
                Surah Al-Ma'idah
              </a>
            </li>
          </ul>
        </li>

        <li>
          <input type="checkbox" id="Attend-quran-session" />
          <label for="Attend-quran-session">Attend Quran Session</label>
          <ul class="sub-item">
            <li>
              <a
                class="sub-item-link"
                target="_blank"
                href="https://www.youtube.com/watch?v=TG36vshU9lM"
              >
                Quran Session
              </a>
            </li>
          </ul>
        </li>

        <li>
          <input type="checkbox" id="learning-programing" />
          <label for="learning-programing">Learning Programming</label>
          <ul class="sub-item">
            <li>
              <a
                class="sub-item-link"
                target="_blank"
                href="https://www.udemy.com/"
              >
                HTML & CSS
              </a>
            </li>
          </ul>
        </li>

        <li>
          <input type="checkbox" id="practice-programing" />
          <label for="practice-programing">Practice Programming</label>
          <ul class="sub-item">
            <li>
              <a
                class="sub-item-link"
                target="_blank"
                href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-stylized-to-do-list/build-a-stylized-to-do-list"
              >
                Build a Stylized To-Do List
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </body>
</html>
